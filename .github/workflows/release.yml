name: release

on:
  workflow_dispatch:
  push:
    branches: ["main"]

# Prevent two concurrent releases racing on the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - run: black --check .
      - run: ruff format --check .
      - run: ruff check .
      - run: pylint garuda_tunnel/
      - run: vulture garuda_tunnel/ vulture_whitelist.py
      - run: mypy --strict garuda_tunnel
      - name: combined unit + integration coverage gate
        run: |
          coverage run -m pytest tests/unit -v
          coverage run -m pytest tests/integration -m integration -v
          coverage combine
          coverage report --fail-under=80
      - run: python -m build

      # Auto-increment SemVer tag (vX.Y.Z). If no tag exists yet, INITIAL_VERSION
      # is used, so the first release becomes v0.0.1. Subsequent runs bump patch
      # by default (DEFAULT_BUMP=patch).
      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: "true"
          DEFAULT_BUMP: patch
          INITIAL_VERSION: 0.0.1
          TAG_CONTEXT: repo
          PRERELEASE: "false"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
